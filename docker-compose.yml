services:
  tool-server:
    build: .
    container_name: enterprise-tool-server
    command: uvicorn src.mcp_server.server:app --host 0.0.0.0 --port 7001
    ports:
      - "7001:7001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  agent-api:
    build: .
    container_name: enterprise-agent-api
    command: uvicorn src.agent_api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TOOL_SERVER_URL=http://tool-server:7001
    depends_on:
      - tool-server
    volumes:
      - ./data:/app/data